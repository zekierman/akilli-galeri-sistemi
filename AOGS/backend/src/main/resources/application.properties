# =================================================================
# AOGS Backend - Spring Boot Yapılandırma
# =================================================================

spring.application.name=aogs-backend
server.port=8080

# -----------------------------------------------------------------
# Yerel PostgreSQL Veritabanı Bağlantısı
# -----------------------------------------------------------------
spring.datasource.url=jdbc:postgresql://localhost:5432/aogs
spring.datasource.username=postgres
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# -----------------------------------------------------------------
# JPA / Hibernate
# -----------------------------------------------------------------
# update: tablolar yoksa oluşturur, varsa şemayı günceller.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# -----------------------------------------------------------------
# Loglama
# -----------------------------------------------------------------
logging.level.com.galeri=INFO
logging.level.org.hibernate.SQL=DEBUG